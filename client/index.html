    <!-- JSON-LD Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Widget Date",
      "applicationCategory": "LifestyleApplication",
      "description": "Widget Date — Trợ lý hẹn hò AI giúp bạn lên lịch hẹn hoàn hảo chỉ trong 3 click. Tìm quán, gợi ý outfit, đặt xe, tích điểm Date Miles.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "VND"
      },
      "author": {
        "@type": "Organization",
        "name": "Widget Date Team",
        "url": "https://widgetdate.app/"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "1250",
        "bestRating": "5"
      },
      "screenshot": "https://widgetdate.app/preview.png",
      "operatingSystem": "Web",
      "url": "https://widgetdate.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://widgetdate.app/explore?search={search_term}",
        "query-input": "required name=search_term"
      },
      "featureList": [
        "AI-powered date planning",
        "Restaurant and venue recommendations",
        "Outfit suggestions",
        "Ride booking integration",
        "Date miles rewards system"
      ]
    }
    </script>
