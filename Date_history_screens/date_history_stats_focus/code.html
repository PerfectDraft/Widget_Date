<style>

            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(244, 167, 185, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background/60 dark:bg-surface-dim/60 backdrop-blur-xl border-b border-outline-variant/20 shadow-sm flex items-center px-6 py-5">
<button class="text-[#F4A7B9] dark:text-[#F4A7B9] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">menu</span>
</button>
<h1 class="font-['Epilogue'] font-bold tracking-[0.15em] text-sm uppercase text-primary/80 dark:text-primary-fixed-dim absolute left-1/2 -translate-x-1/2">Date History</h1>
</header>
<main class="pt-[100px] px-container-padding max-w-4xl mx-auto space-y-section-gap">
<!-- Stats Section -->
<section>
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-gap">Your Journey</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Total Dates Card -->
<div class="glass-card rounded-lg p-6 relative overflow-hidden group">
<div class="absolute -right-10 -top-10 w-32 h-32 bg-primary-container/20 rounded-full blur-2xl"></div>
<div class="flex items-start justify-between relative z-10">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2">Total Dates</p>
<p class="font-headline-xl text-headline-xl text-primary">24</p>
</div>
<div class="w-12 h-12 rounded-full bg-primary-container/30 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
</div>
<!-- Date Miles Card -->
<div class="glass-card rounded-lg p-6 relative overflow-hidden">
<div class="absolute -left-10 -bottom-10 w-32 h-32 bg-tertiary-container/20 rounded-full blur-2xl"></div>
<div class="flex items-start justify-between relative z-10">
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-2">Moments Shared</p>
<p class="font-headline-xl text-headline-xl text-tertiary">128</p>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Hours of connection</p>
</div>
<div class="w-12 h-12 rounded-full bg-tertiary-container/30 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">schedule</span>
</div>
</div>
</div>
</div>
</section>
<!-- History List -->
<section>
<div class="flex justify-between items-end mb-stack-gap">
<h2 class="font-headline-md text-headline-md text-on-surface">Recent Dates</h2>
<button class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors">View All</button>
</div>
<div class="space-y-gutter">
<!-- History Item 1 -->
<div class="bg-surface-container-lowest rounded-lg p-4 shadow-[0_2px_10px_rgba(244,167,185,0.05)] border border-surface-variant flex items-center gap-4 hover:shadow-[0_4px_15px_rgba(244,167,185,0.1)] transition-shadow">
<div class="w-16 h-16 rounded-DEFAULT overflow-hidden shrink-0">
<img alt="Coffee date" class="w-full h-full object-cover" data-alt="A warm, inviting shot of two cups of artisan coffee on a light wooden table. Soft morning sunlight streams across the scene, creating gentle shadows. The aesthetic is modern minimal romantic, utilizing soft cream and warm brown tones to evoke a cozy, intimate morning date setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAIAFBdxpaGnW-UJxtTQ5aeANvhqy5O0BxGC7JkbWUsJBNuUoXFDctXzmMQKdhU-nns4IFSa8u53L2Ll3KdrjyTn7ksuYuLkz-dLeKqWusdlrOdW00dCNS3mO8p2s85NSGhIHEHl_hG63pkbkx1zywszLat4nVUDHC0w5fXCSUhPWVQzZaZ03fgQJL8pSiOyDUC5w_erJ2zEgv076cTpkt_cs0MczI9gzety4i-kR2lj0TTlyNbBTKIcRO1SHHUOy3F0xttsou1yLtK"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start mb-1">
<h3 class="font-label-md text-label-md text-on-surface">Morning Coffee Walk</h3>
<span class="font-label-sm text-label-sm text-on-surface-variant">Oct 24</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm line-clamp-1 mb-2">Blue Bottle Coffee to the Pier</p>
<div class="flex items-center gap-2">
<span class="px-2 py-1 bg-surface-container rounded-full font-label-sm text-label-sm text-on-surface text-[10px]">Casual</span>
<span class="px-2 py-1 bg-surface-container rounded-full font-label-sm text-label-sm text-on-surface text-[10px]">Outdoor</span>
</div>
</div>
</div>
<!-- History Item 2 -->
<div class="bg-surface-container-lowest rounded-lg p-4 shadow-[0_2px_10px_rgba(244,167,185,0.05)] border border-surface-variant flex items-center gap-4 hover:shadow-[0_4px_15px_rgba(244,167,185,0.1)] transition-shadow">
<div class="w-16 h-16 rounded-DEFAULT overflow-hidden shrink-0">
<img alt="Dinner date" class="w-full h-full object-cover" data-alt="An elegant dinner setting at a modern restaurant. Focus on beautifully plated food on pristine white ceramics, with blurred ambient string lights in the background. The lighting is low but warm, emphasizing a sophisticated romantic evening with soft cream and subtle gold highlights." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdxkpj9TUgssDyPeJxRkZ1-imnwx1UwrVaSIMnA7i-EF0kR3jcRXB5Cf2PuALDei6Vt_ZvqOZZPka1OIcjdypDilDjAx1psVxlQDyJE8vt1yGsMTH8JtjfrmMvGPU-Tj5L6YZKZXXgKfM5LOpPAQMWx4ESGmEIdAw5Ss5N1yieRY8BLaeDVgiRiCrioNv-TtgKVwQcW345iPvSv36TL872W7eHFsu7kiYVKmTrvndjHOR8HsT5Tr-c69BhXDI_kObU5zXErUmypeN6"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start mb-1">
<h3 class="font-label-md text-label-md text-on-surface">Anniversary Dinner</h3>
<span class="font-label-sm text-label-sm text-on-surface-variant">Oct 15</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm line-clamp-1 mb-2">L'Artusi in West Village</p>
<div class="flex items-center gap-2">
<span class="px-2 py-1 bg-primary-container/20 text-primary-container rounded-full font-label-sm text-label-sm text-[10px]">Special</span>
<span class="px-2 py-1 bg-surface-container rounded-full font-label-sm text-label-sm text-on-surface text-[10px]">Dining</span>
</div>
</div>
</div>
</div>
</section>

<button class="flex flex-col items-center justify-center text-rose-300 dark:text-rose-700 px-5 py-2 hover:text-[#F4A7B9] transition-colors active:scale-90 duration-300 ease-out group">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">chat_bubble</span>
<span class="font-['Epilogue'] text-[10px] font-medium uppercase tracking-widest">Messages</span>
</button>
<button class="flex flex-col items-center justify-center text-rose-300 dark:text-rose-700 px-5 py-2 hover:text-[#F4A7B9] transition-colors active:scale-90 duration-300 ease-out group">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">person</span>
